version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "03:00"
    open-pull-requests-limit: 25
    assignees:
      - "playpauseandstop"
    labels:
      - "build"
      - "dependencies"
    allow:
      - dependency-type: "direct"
    groups:
      dev-dependencies:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directories:
      - "/.github/**/*"
    schedule:
      interval: "monthly"
      time: "05:00"
    open-pull-requests-limit: 10
    assignees:
      - "playpauseandstop"
    labels:
      - "build"
      - "ci"
      - "dependencies"
    groups:
      ci-dependencies:
        patterns: ["*"]
