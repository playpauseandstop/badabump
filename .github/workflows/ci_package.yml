name: "(Reusable) Build & Deploy Package"

on:
  workflow_call:
    inputs:
      twine-version:
        description: "Twine version to use."
        type: "string"
        required: false
        default: "6.2.0"

jobs:
  package:
    name: "Build & Deploy Package"

    runs-on: "ubuntu-24.04"

    steps:
      - uses: "actions/checkout@v6.0.3"

      - id: "python_and_poetry"
        uses: "./.github/actions/install_python_and_poetry"
        with:
          python-version-file: ".python-version"

      - name: "Build package"
        run: "poetry build"

      - name: "Check package"
        run: "pipx run --python='${{ steps.python_and_poetry.outputs.python-path }}' twine==${{ inputs.twine-version }} check dist/*"

      - name: "Publish package"
        if: "${{ startsWith(github.ref, 'refs/tags/') }}"
        uses: "pypa/gh-action-pypi-publish@v1.14.0"
        with:
          attestations: false  # Disable attestations until publishing to PyPI from reusable workflow will be fixed
