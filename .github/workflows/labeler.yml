defaults:
  run:
    shell: "bash"

name: "[AUTO] Pull Request Labeler"

on:
  - "pull_request_target"

jobs:
  labeler:
    name: "Pull Request Labeler"

    permissions:
      contents: "read"
      pull-requests: "write"

    runs-on: "ubuntu-24.04"

    steps:
      - uses: "actions/labeler@v6.1.0"
